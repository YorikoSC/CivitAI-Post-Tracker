name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Do not include API keys, `config.json`, database files, or unredacted logs in a public issue.
        For security-sensitive reports, use the process in `SECURITY.md`.

  - type: input
    id: version
    attributes:
      label: App version
      description: Example: 10.3.0
      placeholder: "10.3.0"
    validations:
      required: true

  - type: dropdown
    id: install_mode
    attributes:
      label: Install mode
      options:
        - Packaged EXE
        - Source mode
        - Not sure
    validations:
      required: true

  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the failure or unexpected behavior.
      placeholder: "The app..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that triggers the problem.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics and logs
      description: Paste only redacted relevant lines from Diagnostics, `logs/core_last.log`, or `logs/app.log`.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys, private database contents, and other sensitive local data.
          required: true

