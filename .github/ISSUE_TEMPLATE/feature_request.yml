name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please focus on the user workflow and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and what gets in the way?
      placeholder: "When I use the tracker..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or UI you would like to see.
      placeholder: "It would help if..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app
        - Dashboard
        - Updates
        - Collection tracking
        - Build/release flow
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or other designs you considered.
    validations:
      required: false

